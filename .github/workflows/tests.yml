name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # openbb-core 2.0.0 (v5) is not on PyPI yet; install it from the
      # rockbound/OpenBB fork branch the extension was generated against.
      - name: Install dependencies
        run: |
          pip install "openbb-core[pandas] @ git+https://github.com/rockbound/OpenBB@eodhd-codegen-fixes#subdirectory=openbb_platform/core"
          pip install -e . pytest pytest-recorder
      - name: Run tests
        run: pytest tests/ -v
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
